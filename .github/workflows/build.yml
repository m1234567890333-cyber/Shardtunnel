name: Super Simple Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/example/shardtunnel
          
          # 1. Создаем настройки сборки
          cat <<EOF > settings.gradle
          rootProject.name = "ShardTunnel"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2'; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.example.shardtunnel'
              compileSdk 34
              defaultConfig { applicationId "com.example.shardtunnel"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # 2. Создаем Манифест
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application android:label="ShardTunnel" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
                  <service android:name=".MyVpnService" android:permission="android.permission.BIND_VPN_SERVICE" android:exported="false">
                      <intent-filter><action android:name="android.net.VpnService" /></intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          chmod +x gradlew || (wget https://raw.githubusercontent.com/gradle/gradle/master/gradlew && chmod +x gradlew)
          ./gradlew assembleDebug

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ShardTunnel-Ready-APK
          path: app/build/outputs/apk/debug/app-debug.apk
