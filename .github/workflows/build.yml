name: ShardTunnel-Last-Try
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          # Создаем структуру заново, чтобы точно не было ошибок
          rm -rf app
          mkdir -p app/src/main/java/com/example/shardtunnel
          
          echo "include ':app'" > settings.gradle
          
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.example.shardtunnel'
              compileSdk 34
              defaultConfig { applicationId "com.example.shardtunnel"; minSdk 24; targetSdk 34 }
          }
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="ShardTunnel"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml
          echo "package com.example.shardtunnel; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends AppCompatActivity { @Override protected void onCreate(Bundle s) { super.onCreate(s); } }" > app/src/main/java/com/example/shardtunnel/MainActivity.java

          # Самое важное: используем встроенный в систему gradle
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShardTunnel-Final
          path: app/build/outputs/apk/debug/app-debug.apk
