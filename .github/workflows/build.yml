name: Final Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create App
        run: |
          mkdir -p app/src/main/java/com/example/shardtunnel
          echo "rootProject.name = 'ShardTunnel'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2'; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
          android {
              namespace 'com.example.shardtunnel'
              compileSdk 34
              defaultConfig { applicationId "com.example.shardtunnel"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="ShardTunnel">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <service android:name=".MyVpnService" android:permission="android.permission.BIND_VPN_SERVICE" android:exported="false">
                      <intent-filter><action android:name="android.net.VpnService"/></intent-filter>
                  </service>
              </application>
          </manifest>
          EOF

          echo "package com.example.shardtunnel; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; class MainActivity : AppCompatActivity() { override fun onCreate(s: Bundle?) { super.onCreate(s) } }" > app/src/main/java/com/example/shardtunnel/MainActivity.kt
          echo "package com.example.shardtunnel; import android.net.VpnService; class MyVpnService : VpnService()" > app/src/main/java/com/example/shardtunnel/MyVpnService.kt

      - name: Build with Gradle
        run: |
          curl -s "https://raw.githubusercontent.com/gradle/gradle/master/gradlew" > gradlew
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShardTunnel-App
          path: app/build/outputs/apk/debug/app-debug.apk
